<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <title>
  {{ if .Params.seo_title }}
    {{ .Params.seo_title }} · {{ site.Title }}
  {{ else if .IsHome }}
    {{ site.Title }}
  {{ else }}
    {{ .Title }} · {{ site.Title }}
  {{ end }}
  </title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="{{ with .Params.robots }}{{ . }}{{ else }}index, follow{{ end }}">

  <!-- sync with CSS var(--color-page-background) -->
  <meta name="theme-color" content="#fafafa">

  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">

  <link rel="canonical" href="{{ .Permalink }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ if .Params.seo_title }}{{ .Params.seo_title }}{{ else }}{{ .Title }}{{ end }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">

  {{ if .Params.images }}
    <meta property="og:image" content="{{ (index .Params.images 0) | absURL }}.jpg">
  {{ else }}
    <meta property="og:image" content="{{ "images/og-default-v2.jpg" | absURL }}">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
  {{ end }}

  <meta property="og:image:alt" content="{{ with .Description }}{{ . }}{{ else }}Personal website of Clément Vidon.{{ end }}">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ if .Params.seo_title }}{{ .Params.seo_title }}{{ else }}{{ .Title }}{{ end }}">
  <meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  {{ if .Params.images }}
    <meta name="twitter:image" content="{{ (index .Params.images 0) | absURL }}.jpg">
  {{ else }}
    <meta name="twitter:image" content="{{ "images/og-default-v2.jpg" | absURL }}">
  {{ end }}

  <!-- Icons -->
  <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🌱</text></svg>'>

  <!-- Prefetch -->
  <link rel="prefetch" href="/writing/">
  <link rel="prefetch" href="/visuals/">

  <!-- CSS -->
  <link rel="stylesheet" href="/style.css">

  <!-- Scripts -->
  <script src="https://instant.page/5.2.0" type="module"></script>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Clément Vidon",
    "url": "https://cvidon.com",
    "jobTitle": "Portrait and documentary photographer",
    "knowsAbout": [
      "Fashion photography",
      "Portrait photography",
      "Documentary photography",
      "Event photography",
      "Writing",
      "Software engineering",
      "Backend engineering",
      "Generative art",
      "DevOps"
    ],
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Paris",
      "addressCountry": "FR"
    },
    "sameAs": [
      "https://www.linkedin.com/in/clementvidon/",
      "https://www.instagram.com/cl3don/",
      "https://github.com/clementvidon",
      "https://substack.com/@cl3don",
      "https://x.com/cl3don",
      "https://bsky.app/profile/cl3don.bsky.social"
    ]
  }
  </script>

  <!-- Umami analytics -->
  {{ if not hugo.IsServer }}
  <script defer src="https://cloud.umami.is/script.js" data-website-id="5a7aa315-c4a2-459e-a4f3-1c7fb4362fb2"></script>
  {{ end }}
</head>

<body>
  <div class="site-shell">
    <header class="site-header">
      <nav class="site-nav" aria-label="Primary">
        <a href="/" {{ if .IsHome }}aria-current="page"{{ end }}>home</a>
        <a href="/writing/" {{ if hasPrefix .RelPermalink "/writing/" }}aria-current="page"{{ end }}>writing</a>
        <a href="/visuals/" {{ if hasPrefix .RelPermalink "/visuals/" }}aria-current="page"{{ end }}>visuals</a>
      </nav>
    </header>

    <main class="site-main">
      {{ block "main" . }}{{ end }}
    </main>

    <footer class="site-footer">
      <ul class="social-links">
        <li>
          <a class="footer-link" href="/writing/index.xml" data-umami-event="click:rss">
            <svg viewBox="0 0 12 12" aria-hidden="true">
              <path d="M2.07102 11.3494L0.963068 10.2415L9.2017 1.98864H2.83807L2.85227 0.454545H11.8438V9.46023H10.2955L10.3097 3.09659L2.07102 11.3494Z" fill="currentColor"></path>
            </svg>
            <span>rss</span>
          </a>
        </li>

        <li class="email-item">
          <input type="checkbox" id="email-toggle" hidden>

          <label for="email-toggle" class="footer-link email-trigger" data-umami-event="click:email">
            <svg viewBox="0 0 12 12" aria-hidden="true">
              <path d="M2.07102 11.3494L0.963068 10.2415L9.2017 1.98864H2.83807L2.85227 0.454545H11.8438V9.46023H10.2955L10.3097 3.09659L2.07102 11.3494Z" fill="currentColor"></path>
            </svg>
            <span>email</span>
          </label>

          <span class="email-address">cvidon@student.42.fr</span>
        </li>

        <li>
          <a class="footer-link" href="https://substack.com/@cl3don" rel="me" data-umami-event="click:substack">
            <svg viewBox="0 0 12 12" aria-hidden="true">
              <path d="M2.07102 11.3494L0.963068 10.2415L9.2017 1.98864H2.83807L2.85227 0.454545H11.8438V9.46023H10.2955L10.3097 3.09659L2.07102 11.3494Z" fill="currentColor"></path>
            </svg>
            <span>substack</span>
          </a>
        </li>
        <li>
          <a class="footer-link" href="https://github.com/clementvidon/" rel="me" data-umami-event="click:github">
            <svg viewBox="0 0 12 12" aria-hidden="true">
              <path d="M2.07102 11.3494L0.963068 10.2415L9.2017 1.98864H2.83807L2.85227 0.454545H11.8438V9.46023H10.2955L10.3097 3.09659L2.07102 11.3494Z" fill="currentColor"></path>
            </svg>
            <span>github</span>
          </a>
        </li>
      </ul>
    </footer>
  </div>
</body>
</html>
