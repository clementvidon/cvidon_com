{{- $isMe := or
  (in .Destination "instagram.com/cl3don")
  (in .Destination "substack.com/@cl3don")
  (in .Destination "github.com/clementvidon")
-}}
{{- $isExternal := strings.HasPrefix .Destination "http" -}}

<a href="{{ .Destination | safeURL }}"
  {{ with .Title }}title="{{ . }}"{{ end }}
  {{ if $isExternal }}
    rel="{{ if $isMe }}me noopener noreferrer{{ else }}noopener noreferrer{{ end }}"
  {{ else if $isMe }}
    rel="me"
  {{ end }}
>{{ .Text | safeHTML }}</a>{{- "" -}}
